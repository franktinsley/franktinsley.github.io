<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Frank Tinsley — Real-Time Graphics</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  body { height: 100dvh; }
  canvas#gfx {
    position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh;
    display: block; touch-action: none;
  }
  .overlay {
    position: fixed; inset: 0; display: grid; place-items: center;
    pointer-events: none; z-index: 2;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Inter, system-ui, sans-serif;
  }
  .hero { text-align: center; }
  .hero h1 {
    font-size: clamp(2.2rem, 6vw, 4.5rem);
    font-weight: 700; letter-spacing: -0.02em;
    color: #f2f4f8;
    text-shadow: 0 2px 24px rgba(0,0,0,.55);
  }
  .hero p {
    margin-top: .6rem;
    font-size: clamp(.95rem, 2vw, 1.25rem);
    font-weight: 400; letter-spacing: .06em;
    color: rgba(226,232,244,.72);
    text-shadow: 0 1px 12px rgba(0,0,0,.6);
  }
  .tag {
    position: fixed; bottom: 14px; right: 16px; z-index: 3;
    font: 11px/1 ui-monospace, monospace; color: rgba(200,210,230,.4);
  }
  #nogpu {
    position: fixed; inset: 0; display: none; place-items: center; z-index: 4;
    background: radial-gradient(ellipse at 50% 40%, #10131c, #06070a);
    color: #c8d0e0; font-family: system-ui, sans-serif; text-align: center; padding: 2rem;
  }
</style>
</head>
<body>
<canvas id="gfx"></canvas>
<div class="overlay">
  <div class="hero">
    <h1>Frank Tinsley</h1>
    <p>REAL-TIME GRAPHICS ENGINEERING · INTERACTION DESIGN</p>
  </div>
</div>
<div class="tag">v0 prototype · WebGPU</div>
<div id="nogpu"><div>
  <h2>WebGPU not available in this browser</h2>
  <p style="margin-top:.8rem;opacity:.7">Fallback path (WebGL2 / video) lands in v1.</p>
</div></div>
<script type="module" src="main.js?v=cc12360-163523"></script>
</body>
</html>
